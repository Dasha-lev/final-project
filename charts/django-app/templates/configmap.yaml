apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "django-app.fullname" . }}-config
data:
  {{- range $key, $val := .Values.configMap }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  DB_ENGINE: "django.db.backends.postgresql"
  DB_HOST: "{{ .Values.database.host }}"
  DB_PORT: "5432"
  DB_NAME: "djangodb"
  DB_USER: "dbadmin"